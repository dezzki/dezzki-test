<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 440" width="100%" height="100%">
  <style>
    .bg { fill: #0d1117; rx: 8px; }
    .term-window { fill: #161b22; rx: 6px; }
    .text-base { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 13px; fill: #c9d1d9; }
    .ascii { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 12px; fill: #58a6ff; }
    .user { fill: #58a6ff; font-weight: bold; }
    .accent { fill: #ff7b72; }
    .dim { fill: #8b949e; }
  </style>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" class="bg" />
  
  <!-- Terminal Header Title -->
  <text x="35" y="40" class="text-base" style="fill: #8b949e;">corpxe / <tspan font-weight="bold" fill="#c9d1d9">README.md</tspan></text>

  <!-- Main Terminal Box -->
  <rect x="35" y="65" width="670" height="340" class="term-window" />

  <!-- Left Side: Spider-Man ASCII Art (Fixed using vertical line steps) -->
  <text x="60" y="115" class="ascii" xml:space="preserve">
    <tspan x="60" dy="0">   .-''''''-.</tspan>
    <tspan x="60" dy="18"> .'  __  __  '.</tspan>
    <tspan x="60" dy="18">/   /  \/  \   \</tspan>
    <tspan x="60" dy="18">|   \  /\  /   |</tspan>
    <tspan x="60" dy="18">|    '-' '-'   |</tspan>
    <tspan x="60" dy="18"> \    ____    /</tspan>
    <tspan x="60" dy="18"> '.  \  /  .'</tspan>
    <tspan x="60" dy="18">   '-.__.-'   </tspan>
    <tspan x="60" dy="18">  /        \  </tspan>
    <tspan x="60" dy="18"> /  /\  /\  \ </tspan>
    <tspan x="60" dy="18">/  /  \/  \  \</tspan>
    <tspan x="60" dy="18">|  |   ||   |  |</tspan>
    <tspan x="60" dy="18">\  \   ||  /  /</tspan>
    <tspan x="60" dy="18"> '. \  || / .' </tspan>
    <tspan x="60" dy="18">   '-.||.-'   </tspan>
  </text>

  <!-- Right Side: System Fetch Stats -->
  <g class="text-base" transform="translate(260, 115)">
    <!-- Header -->
    <text x="0" y="0"><tspan class="user">corpxe@archlinux</tspan> <tspan class="dim">----------------------------------------</tspan></text>
    
    <!-- System Specs -->
    <text x="0" y="22"><tspan class="accent">OS:</tspan><tspan class="dim"> .............................</tspan> Arch Linux</text>
    <text x="0" y="40"><tspan class="accent">Shell:</tspan><tspan class="dim"> ..........................</tspan> fish shell</text>
    <text x="0" y="58"><tspan class="accent">Uptime:</tspan><tspan class="dim"> .........................</tspan> [Your Age / Coding Journey Duration]</text>
    <text x="0" y="76"><tspan class="accent">IDE:</tspan><tspan class="dim"> ............................</tspan> VS Code / Neovim</text>
    
    <!-- Languages -->
    <text x="0" y="108"><tspan class="accent">Languages.Programming:</tspan><tspan class="dim"> ..........</tspan> Python (OOP), C++</text>
    <text x="0" y="126"><tspan class="accent">Languages.Data:</tspan><tspan class="dim"> .................</tspan> JSON, Markdown, YAML</text>
    
    <!-- Hobbies -->
    <text x="0" y="158"><tspan class="accent">Hobbies.Software:</tspan><tspan class="dim"> ...............</tspan> Automation Scripts, Algorithmic Challenges</text>
    <text x="0" y="176"><tspan class="accent">Hobbies.Hardware:</tspan><tspan class="dim"> ...............</tspan> Microcontrollers (ESP32, Arduino)</text>
    
    <!-- Contact Section -->
    <text x="0" y="210"><tspan class="dim">- Contact ---------------------------------------------------</tspan></text>
    <text x="0" y="232"><tspan class="accent">Email:</tspan><tspan class="dim"> ..........................</tspan> your.email@example.com</text>
    <text x="0" y="250"><tspan class="accent">GitHub:</tspan><tspan class="dim"> .........................</tspan> github.com/yourusername</text>
  </g>
</svg>
